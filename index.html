<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedTrack">
<meta name="theme-color" content="#0f1117">
<meta name="apple-touch-fullscreen" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f1117'/%3E%3Ctext x='90' y='120' text-anchor='middle' font-size='90' font-family='Georgia'>🩺%3C/text%3E%3C/svg%3E">
<title>MedTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3250;
  --accent:#6c8fff; --accent2:#a78bfa; --text:#eef0f8; --text2:#8b90b0;
  --green:#4ade80; --red:#f87171; --yellow:#fbbf24; --radius:14px;
  --safe-top:env(safe-area-inset-top); --safe-bottom:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--bg);border-bottom:1px solid var(--border)}
.header-title{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-0.5px}
.header-title span{color:var(--accent)}
.btn-add{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(108,143,255,0.4)}
.btn-add:active{transform:scale(0.92)}
.install-banner{display:none;align-items:center;gap:10px;padding:10px 16px;background:rgba(108,143,255,0.12);border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.tabs{display:flex;background:var(--bg);padding:0 20px;gap:4px;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;letter-spacing:0.3px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(20px + var(--safe-bottom))}
.search-bar{padding:12px 20px;display:flex;gap:10px;align-items:center}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 36px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px}
.filter-btn{padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.filter-btn.active{color:var(--accent);border-color:var(--accent)}
.records-list{padding:0 20px;display:flex;flex-direction:column;gap:10px}
.record-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;position:relative;overflow:hidden}
.record-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cat-color)}
.record-card:active{background:var(--surface2)}
.record-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.record-provider{font-weight:600;font-size:15px}
.record-amount{font-weight:600;font-size:16px}
.record-bottom{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.record-cat{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(108,143,255,0.15);color:var(--cat-color);letter-spacing:0.5px;text-transform:uppercase}
.record-owner{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,0.07);color:var(--text2)}
.record-date{font-size:12px;color:var(--text2);margin-left:auto}
.record-comment{font-size:12px;color:var(--text2);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:60px 30px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:15px}
.summary-section{padding:16px 20px}
.summary-heading{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.summary-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cat-color)}
.summary-card-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:6px}
.summary-card-amount{font-size:20px;font-weight:600}
.summary-card-count{font-size:11px;color:var(--text2);margin-top:2px}
.total-card{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.total-label{font-size:14px;font-weight:500;opacity:.85}
.total-amount{font-size:28px;font-weight:700;font-family:'DM Serif Display',serif}
.bar-chart{padding:0 0 8px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:var(--text2);width:60px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease}
.bar-value{font-size:12px;font-weight:500;width:60px;flex-shrink:0}
.year-toggle{display:flex;gap:8px;padding:0 20px 12px}
.year-btn{padding:7px 16px;border-radius:99px;font-size:13px;font-weight:500;border:1.5px solid var(--border);color:var(--text2);cursor:pointer;background:transparent}
.year-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{width:100%;background:var(--surface);border-radius:24px 24px 0 0;padding:0 0 calc(30px + var(--safe-bottom));transform:translateY(100%);transition:transform 0.3s cubic-bezier(.25,.8,.25,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 0}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px}
.modal-title{font-size:18px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:none;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.form-body{padding:0 20px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;display:block}
.form-input{width:100%;padding:13px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;appearance:none;-webkit-appearance:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text2)}
.cat-pills{display:flex;gap:8px;flex-wrap:wrap}
.cat-pill{padding:8px 14px;border-radius:99px;font-size:13px;font-weight:500;border:1.5px solid var(--border);color:var(--text2);cursor:pointer;background:transparent;transition:all 0.15s}
.cat-pill.selected{color:#fff;border-color:transparent;background:var(--cat-color)}
.amount-wrap{position:relative}
.amount-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:16px}
.amount-wrap .form-input{padding-left:28px}
.attach-area{border:1.5px dashed var(--border);border-radius:10px;padding:20px;text-align:center;color:var(--text2);font-size:13px;cursor:pointer}
.attach-icon{font-size:28px;margin-bottom:6px}
.attachments-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.att-thumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--border)}
.att-thumb-wrap{position:relative}
.att-remove{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:var(--red);border-radius:50%;border:none;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer}
#file-input{display:none}
.btn-save{width:100%;padding:15px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-save:active{opacity:0.85}
.btn-delete{width:100%;padding:13px;background:transparent;border:1.5px solid var(--red);border-radius:12px;color:var(--red);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:10px}
.export-btn{display:flex;align-items:center;gap:8px;justify-content:center;padding:13px 24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;width:100%}
.filter-section{padding:0 20px 10px}
.filter-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;display:block}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-pill{padding:7px 14px;border-radius:99px;font-size:13px;border:1.5px solid var(--border);color:var(--text2);cursor:pointer;background:transparent;transition:all 0.15s}
.filter-pill.active{color:var(--accent);border-color:var(--accent);background:rgba(108,143,255,0.1)}
.btn-apply{width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-clear{width:100%;padding:12px;background:transparent;border:1.5px solid var(--border);border-radius:12px;color:var(--text2);font-size:14px;cursor:pointer;margin-top:8px}
.backup-banner{margin:12px 20px 0;padding:14px 16px;background:linear-gradient(135deg,rgba(251,191,36,0.15),rgba(251,191,36,0.05));border:1px solid rgba(251,191,36,0.35);border-radius:var(--radius);display:flex;align-items:flex-start;gap:12px}
.backup-banner-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.backup-banner-body{flex:1}
.backup-banner-title{font-size:13px;font-weight:600;color:var(--yellow);margin-bottom:3px}
.backup-banner-text{font-size:12px;color:var(--text2);line-height:1.5}
.backup-banner-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.backup-banner-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
.backup-banner-btn.primary{background:var(--yellow);color:#000}
.backup-banner-btn.secondary{background:var(--surface2);color:var(--text2)}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">Med<span>Track</span></div>
    <button class="btn-add" onclick="openAdd()">+</button>
  </div>
  <div class="install-banner" id="install-banner">
    <span style="font-size:18px">📲</span>
    <span style="flex:1;line-height:1.4"><strong style="color:var(--text)">Add to Home Screen</strong> for offline use — tap Share → Add to Home Screen in Safari</span>
    <button onclick="document.getElementById('install-banner').style.display='none'" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 4px">×</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-records" onclick="switchTab('records',this)">Records</button>
    <button class="tab" id="tab-summary" onclick="switchTab('summary',this)">Summary</button>
    <button class="tab" id="tab-export" onclick="switchTab('export',this)">Export</button>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="form-title">New Expense</div>
      <button class="modal-close" onclick="closeModal('form-modal')">×</button>
    </div>
    <div class="form-body">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label class="form-label">Owner</label>
        <div class="cat-pills" id="owner-pills">
          <button type="button" class="cat-pill selected" style="--cat-color:#6c8fff" onclick="selectOwner(this)">RL</button>
          <button type="button" class="cat-pill" style="--cat-color:#a78bfa" onclick="selectOwner(this)">MA</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="f-date">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="cat-pills" id="cat-pills"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Provider</label>
        <input type="text" class="form-input" id="f-provider" placeholder="e.g. Dr. Smith, CVS Pharmacy" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Amount</label>
        <div class="amount-wrap">
          <span class="amount-prefix">$</span>
          <input type="number" class="form-input" id="f-amount" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Comments</label>
        <textarea class="form-input" id="f-comment" rows="3" placeholder="Optional notes..." style="resize:none;line-height:1.5"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Receipts / Images</label>
        <div class="attach-area" onclick="document.getElementById('file-input').click()">
          <div class="attach-icon">📎</div>
          <div>Tap to attach photos or receipts</div>
        </div>
        <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this)">
        <div class="attachments-preview" id="attach-preview"></div>
      </div>
      <button type="button" class="btn-save" onclick="saveRecord()">Save Expense</button>
      <button type="button" class="btn-delete" id="btn-delete" style="display:none" onclick="deleteRecord()">Delete</button>
    </div>
  </div>
</div>

<!-- Filter Modal -->
<div class="modal-overlay" id="filter-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Filter</div>
      <button class="modal-close" onclick="closeModal('filter-modal')">×</button>
    </div>
    <div class="filter-section">
      <span class="filter-label">Category</span>
      <div class="filter-pills" id="filter-cats"></div>
      <span class="filter-label">Year</span>
      <div class="filter-pills" id="filter-years"></div>
      <button type="button" class="btn-apply" onclick="applyFilter()">Apply</button>
      <button type="button" class="btn-clear" onclick="clearFilter()">Clear All</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const CATS = ['Medical','Drug','Others','Dental','Vision'];
const CAT_COLORS = {Medical:'#6c8fff',Drug:'#a78bfa',Others:'#34d399',Dental:'#f472b6',Vision:'#fb923c'};

// ============================================================
// STATE
// ============================================================
var records = [];
var currentTab = 'records';
var searchQ = '';
var filterCats = [];
var filterYear = null;
var pendingImages = [];
var editingId = null;
var summaryYear = new Date().getFullYear();
var tmpFilterCats = [];
var tmpFilterYear = null;

// ============================================================
// INDEXEDDB
// ============================================================
var db = null;
var DB_NAME = 'medtrack_db';
var DB_VER  = 1;
var STORE   = 'records';

function initDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = function(e) { db = e.target.result; resolve(); };
    req.onerror   = function()  { reject(req.error); };
  });
}

function dbGetAll() {
  return new Promise(function(resolve, reject) {
    var tx  = db.transaction(STORE, 'readonly');
    var req = tx.objectStore(STORE).getAll();
    req.onsuccess = function() { resolve(req.result || []); };
    req.onerror   = function() { reject(req.error); };
  });
}

function dbPut(record) {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(record);
    tx.oncomplete = resolve;
    tx.onerror    = function() { reject(tx.error); };
  });
}

function dbDelete(id) {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = resolve;
    tx.onerror    = function() { reject(tx.error); };
  });
}

function dbClear() {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).clear();
    tx.oncomplete = resolve;
    tx.onerror    = function() { reject(tx.error); };
  });
}

// Migrate old localStorage data if present
function migrateLocalStorage() {
  try {
    var old = localStorage.getItem('medtrack_v1');
    if (!old) return Promise.resolve();
    var arr = JSON.parse(old);
    if (!Array.isArray(arr) || arr.length === 0) return Promise.resolve();
    var chain = Promise.resolve();
    arr.forEach(function(r) { chain = chain.then(function() { return dbPut(r); }); });
    return chain.then(function() { localStorage.removeItem('medtrack_v1'); });
  } catch(e) { return Promise.resolve(); }
}

// ============================================================
// BACKUP REMINDER
// ============================================================
var BACKUP_TS_KEY     = 'mt_last_backup';
var BACKUP_SNOOZE_KEY = 'mt_snooze_until';
var BACKUP_DAYS       = 7;

function getLastBackupTs() {
  try { return parseInt(localStorage.getItem(BACKUP_TS_KEY) || '0'); } catch(e) { return 0; }
}
function setLastBackupTs() {
  try { localStorage.setItem(BACKUP_TS_KEY, Date.now().toString()); } catch(e) {}
}
function setSnooze(days) {
  try { localStorage.setItem(BACKUP_SNOOZE_KEY, (Date.now() + days * 86400000).toString()); } catch(e) {}
}
function isSnoozed() {
  try { return Date.now() < parseInt(localStorage.getItem(BACKUP_SNOOZE_KEY) || '0'); } catch(e) { return false; }
}
function shouldRemind() {
  if (records.length === 0 || isSnoozed()) return false;
  var last = getLastBackupTs();
  if (!last) return true;
  return (Date.now() - last) / 86400000 >= BACKUP_DAYS;
}

function checkBackupReminder() {
  var existing = document.getElementById('backup-reminder');
  if (existing) existing.remove();
  if (!shouldRemind()) return;
  var last = getLastBackupTs();
  var days = last ? Math.floor((Date.now() - last) / 86400000) : null;
  var msg  = days === null
    ? "You haven't backed up yet. Backups protect your data from Safari resets."
    : "Last backup was " + days + " day" + (days !== 1 ? "s" : "") + " ago. Weekly backups keep your data safe.";
  var banner = document.createElement('div');
  banner.id = 'backup-reminder';
  banner.className = 'backup-banner';
  banner.innerHTML =
    '<div class="backup-banner-icon">🔔</div>' +
    '<div class="backup-banner-body">' +
      '<div class="backup-banner-title">Time to Back Up</div>' +
      '<div class="backup-banner-text">' + msg + '</div>' +
      '<div class="backup-banner-actions">' +
        '<button class="backup-banner-btn primary" onclick="backupNow()">Back Up Now</button>' +
        '<button class="backup-banner-btn secondary" onclick="snoozeReminder()">Later (3 days)</button>' +
        '<button class="backup-banner-btn secondary" onclick="dismissReminder()">Dismiss</button>' +
      '</div>' +
    '</div>';
  var c = document.getElementById('content');
  var sb = c.querySelector('.search-bar');
  if (sb) sb.after(banner); else c.prepend(banner);
}

function backupNow() {
  doBackup();
  var banner = document.getElementById('backup-reminder');
  if (!banner) return;
  banner.style.background = 'linear-gradient(135deg,rgba(74,222,128,0.15),rgba(74,222,128,0.05))';
  banner.style.borderColor = 'rgba(74,222,128,0.35)';
  banner.querySelector('.backup-banner-icon').textContent = '✅';
  banner.querySelector('.backup-banner-title').style.color = 'var(--green)';
  banner.querySelector('.backup-banner-title').textContent = 'Backup Complete';
  banner.querySelector('.backup-banner-text').textContent = 'Store the file in iCloud Drive for safekeeping.';
  banner.querySelector('.backup-banner-actions').remove();
  setTimeout(function() { var b = document.getElementById('backup-reminder'); if (b) b.remove(); }, 4000);
}
function snoozeReminder()  { setSnooze(3); var b = document.getElementById('backup-reminder'); if (b) b.remove(); }
function dismissReminder() { setSnooze(7); var b = document.getElementById('backup-reminder'); if (b) b.remove(); }

// ============================================================
// INIT
// ============================================================
function initApp() {
  initDB()
    .then(function() { return migrateLocalStorage(); })
    .then(function() { return dbGetAll(); })
    .then(function(rows) {
      records = rows;
      render();
      showInstallBanner();
      setTimeout(checkBackupReminder, 700);
    })
    .catch(function(err) {
      console.error('initApp error', err);
      // Fallback: render empty
      render();
    });
}

// ============================================================
// HELPERS
// ============================================================
function todayStr() {
  var d = new Date();
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dy = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dy;
}
function fmtDate(iso) {
  if (!iso) return '';
  var p = iso.split('-');
  return p[1] + '/' + p[2] + '/' + p[0].slice(2);
}
function fmtAmt(v) {
  return '$' + parseFloat(v || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  render();
  if (tab === 'records') setTimeout(checkBackupReminder, 100);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  var c = document.getElementById('content');
  if (currentTab === 'records')  renderRecords(c);
  else if (currentTab === 'summary') renderSummary(c);
  else renderExport(c);
}

function renderRecords(c) {
  var hasFilter = filterCats.length > 0 || filterYear;
  var html = '<div class="search-bar">' +
    '<div class="search-wrap"><span class="search-icon">🔍</span>' +
    '<input type="search" class="form-input" placeholder="Search..." value="' + esc(searchQ) + '"' +
    ' oninput="searchQ=this.value;renderRecords(document.getElementById(\'content\'))" inputmode="search" autocomplete="off"></div>' +
    '<button class="filter-btn' + (hasFilter ? ' active' : '') + '" onclick="openFilter()">Filter' + (hasFilter ? ' ●' : '') + '</button>' +
    '</div>';

  var q = searchQ.toLowerCase();
  var filtered = records.filter(function(r) {
    var mq = !q || (r.provider||'').toLowerCase().indexOf(q) >= 0
      || (r.category||'').toLowerCase().indexOf(q) >= 0
      || String(r.amount||'').indexOf(q) >= 0
      || fmtDate(r.date).indexOf(q) >= 0
      || (r.comment||'').toLowerCase().indexOf(q) >= 0
      || (r.owner||'').toLowerCase().indexOf(q) >= 0;
    var mc = !filterCats.length || filterCats.indexOf(r.category) >= 0;
    var my = !filterYear || (r.date && r.date.indexOf(filterYear) === 0);
    return mq && mc && my;
  }).sort(function(a,b) { return b.date.localeCompare(a.date); });

  if (!filtered.length) {
    html += '<div class="empty"><div class="empty-icon">🩺</div><p>No expenses found</p></div>';
  } else {
    html += '<div class="records-list">';
    filtered.forEach(function(r) {
      var cc = CAT_COLORS[r.category] || '#6c8fff';
      html += '<div class="record-card" style="--cat-color:' + cc + '" onclick="openEdit(\'' + r.id + '\')">' +
        '<div class="record-top"><div class="record-provider">' + esc(r.provider || '—') + '</div>' +
        '<div class="record-amount">' + fmtAmt(r.amount) + '</div></div>' +
        '<div class="record-bottom">' +
        '<span class="record-cat" style="--cat-color:' + cc + '">' + esc(r.category) + '</span>' +
        '<span class="record-owner">' + esc(r.owner || 'RL') + '</span>' +
        '<span class="record-date">' + fmtDate(r.date) + '</span>' +
        '</div>' +
        (r.comment ? '<div class="record-comment">' + esc(r.comment) + '</div>' : '') +
        '</div>';
    });
    html += '</div>';
  }
  c.innerHTML = html;
}

function renderSummary(c) {
  var curYear = new Date().getFullYear();
  var yStr = String(summaryYear);
  var html = '<div class="year-toggle">';
  [curYear, curYear - 1].forEach(function(y) {
    html += '<button class="year-btn' + (summaryYear === y ? ' active' : '') + '" onclick="summaryYear=' + y + ';renderSummary(document.getElementById(\'content\'))">' + y + '</button>';
  });
  html += '</div>';

  var yRecs = records.filter(function(r) { return r.date && r.date.indexOf(yStr) === 0; });
  var totals = {}; var grand = 0;
  CATS.forEach(function(c) { totals[c] = 0; });
  yRecs.forEach(function(r) { totals[r.category] = (totals[r.category] || 0) + parseFloat(r.amount || 0); grand += parseFloat(r.amount || 0); });
  var maxVal = Math.max.apply(null, Object.values(totals).concat([1]));

  html += '<div class="summary-section">' +
    '<div class="total-card"><div><div class="total-label">' + yStr + ' Total</div>' +
    '<div style="font-size:12px;opacity:.7;margin-top:2px">' + yRecs.length + ' expense' + (yRecs.length !== 1 ? 's' : '') + '</div></div>' +
    '<div class="total-amount">' + fmtAmt(grand) + '</div></div>' +
    '<div class="summary-heading">By Category</div><div class="bar-chart">';

  CATS.forEach(function(cat) {
    var cc  = CAT_COLORS[cat];
    var pct = (totals[cat] / maxVal * 100).toFixed(1);
    html += '<div class="bar-row">' +
      '<div class="bar-label">' + cat + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + cc + '"></div></div>' +
      '<div class="bar-value">' + fmtAmt(totals[cat]) + '</div></div>';
  });

  html += '</div><div class="summary-heading" style="margin-top:16px">Details</div><div class="summary-cards">';
  CATS.forEach(function(cat) {
    var cc  = CAT_COLORS[cat];
    var cnt = yRecs.filter(function(r) { return r.category === cat; }).length;
    html += '<div class="summary-card" style="--cat-color:' + cc + '">' +
      '<div class="summary-card-label">' + cat + '</div>' +
      '<div class="summary-card-amount">' + fmtAmt(totals[cat]) + '</div>' +
      '<div class="summary-card-count">' + cnt + ' claim' + (cnt !== 1 ? 's' : '') + '</div></div>';
  });
  html += '</div></div>';
  c.innerHTML = html;
}

function renderExport(c) {
  var curYear = new Date().getFullYear();
  c.innerHTML =
    '<div class="summary-section">' +
    '<div class="summary-heading">Export to Spreadsheet</div>' +
    '<p style="color:var(--text2);font-size:14px;margin-bottom:20px;line-height:1.6">Export records as CSV — opens in Excel, Numbers, or Google Sheets.</p>' +
    '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px">' +
    '<button class="export-btn" onclick="exportCSV(' + curYear + ')">📊 Export ' + curYear + ' (YTD)</button>' +
    '<button class="export-btn" onclick="exportCSV(' + (curYear-1) + ')">📊 Export ' + (curYear-1) + '</button>' +
    '<button class="export-btn" onclick="exportCSV(null)">📊 Export All Records</button>' +
    '</div>' +
    '<div class="summary-heading">Backup &amp; Restore</div>' +
    '<p style="color:var(--text2);font-size:13px;margin-bottom:12px;line-height:1.6">Transfer all data (including images) between Safari and the Home Screen app, or keep an off-device backup.</p>' +
    '<div style="display:flex;flex-direction:column;gap:10px">' +
    '<button class="export-btn" onclick="doBackup()">💾 Backup All Data (JSON)</button>' +
    '<label class="export-btn" style="cursor:pointer">📥 Restore from Backup<input type="file" accept=".json" style="display:none" onchange="restoreJSON(this)"></label>' +
    '</div>' +
    '<div style="margin-top:16px;padding:14px;background:var(--surface2);border-radius:12px;color:var(--text2);font-size:12px;line-height:1.7">' +
    '<strong style="color:var(--accent)">Tip:</strong> Safari and the Home Screen app have separate storage. If you added records in Safari before installing, use <strong style="color:var(--text)">Backup → Restore</strong> to transfer them.' +
    '</div></div>';
}

// ============================================================
// EXPORT / BACKUP
// ============================================================
function exportCSV(year) {
  var data = (year ? records.filter(function(r) { return r.date && r.date.indexOf(String(year)) === 0; }) : records.slice())
    .sort(function(a,b) { return a.date.localeCompare(b.date); });
  var rows = [['Date','Owner','Category','Provider','Amount','Comments']];
  data.forEach(function(r) {
    rows.push([fmtDate(r.date), r.owner||'RL', r.category, r.provider||'', parseFloat(r.amount||0).toFixed(2), (r.comment||'').replace(/"/g,'""')]);
  });
  rows.push([]);
  rows.push(['SUMMARY','','','','','']);
  var totals = {};
  CATS.forEach(function(c) { totals[c] = 0; });
  data.forEach(function(r) { totals[r.category] = (totals[r.category]||0) + parseFloat(r.amount||0); });
  CATS.forEach(function(cat) { rows.push([cat,'','','',totals[cat].toFixed(2),'']); });
  var grand = Object.values(totals).reduce(function(a,b){return a+b;},0);
  rows.push(['TOTAL','','','',grand.toFixed(2),'']);
  var csv  = rows.map(function(r) { return r.map(function(v) { return '"'+v+'"'; }).join(','); }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'medical-expenses' + (year ? '-'+year : '') + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function doBackup() {
  var dateStr = todayStr();
  var blob = new Blob([JSON.stringify(records, null, 2)], {type:'application/json'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'medtrack-backup-' + dateStr + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setLastBackupTs();
}

function restoreJSON(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) { alert('Invalid backup file.'); return; }
      if (!confirm('Restore ' + imported.length + ' records? This will replace all current data.')) return;
      dbClear().then(function() {
        var chain = Promise.resolve();
        imported.forEach(function(r) { chain = chain.then(function() { return dbPut(r); }); });
        return chain;
      }).then(function() {
        return dbGetAll();
      }).then(function(rows) {
        records = rows;
        switchTab('records', document.getElementById('tab-records'));
      });
    } catch(err) { alert('Could not read backup file.'); }
  };
  reader.readAsText(file);
}

// ============================================================
// FORM
// ============================================================
function buildCatPills(selected) {
  var container = document.getElementById('cat-pills');
  container.innerHTML = '';
  CATS.forEach(function(cat) {
    var cc  = CAT_COLORS[cat];
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cat-pill' + (cat === selected ? ' selected' : '');
    btn.style.setProperty('--cat-color', cc);
    btn.textContent = cat;
    btn.onclick = function() {
      document.querySelectorAll('#cat-pills .cat-pill').forEach(function(p) { p.classList.remove('selected'); });
      btn.classList.add('selected');
    };
    container.appendChild(btn);
  });
}

function selectOwner(btn) {
  document.querySelectorAll('#owner-pills .cat-pill').forEach(function(p) { p.classList.remove('selected'); });
  btn.classList.add('selected');
}
function getOwner() {
  var el = document.querySelector('#owner-pills .cat-pill.selected');
  return el ? el.textContent.trim() : 'RL';
}

function openAdd() {
  editingId = null;
  pendingImages = [];
  document.getElementById('edit-id').value = '';
  document.getElementById('form-title').textContent = 'New Expense';
  document.getElementById('f-date').value = todayStr();
  document.getElementById('f-provider').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-comment').value = '';
  document.getElementById('attach-preview').innerHTML = '';
  document.getElementById('btn-delete').style.display = 'none';
  document.querySelectorAll('#owner-pills .cat-pill').forEach(function(p,i) { p.classList.toggle('selected', i === 0); });
  buildCatPills('Medical');
  openModal('form-modal');
  setTimeout(function() { document.getElementById('f-provider').focus(); }, 400);
}

function openEdit(id) {
  var r = null;
  for (var i = 0; i < records.length; i++) { if (records[i].id === id) { r = records[i]; break; } }
  if (!r) return;
  editingId = id;
  pendingImages = (r.images || []).slice();
  document.getElementById('edit-id').value = id;
  document.getElementById('form-title').textContent = 'Edit Expense';
  document.getElementById('f-date').value = r.date;
  document.getElementById('f-provider').value = r.provider || '';
  document.getElementById('f-amount').value = r.amount;
  document.getElementById('f-comment').value = r.comment || '';
  document.getElementById('btn-delete').style.display = '';
  var owner = r.owner || 'RL';
  document.querySelectorAll('#owner-pills .cat-pill').forEach(function(p) {
    p.classList.toggle('selected', p.textContent.trim() === owner);
  });
  buildCatPills(r.category);
  renderPreviews();
  openModal('form-modal');
}

function saveRecord() {
  var date     = document.getElementById('f-date').value;
  var provider = document.getElementById('f-provider').value.trim();
  var amount   = document.getElementById('f-amount').value;
  var comment  = document.getElementById('f-comment').value.trim();
  var catEl    = document.querySelector('#cat-pills .cat-pill.selected');
  var category = catEl ? catEl.textContent.trim() : 'Medical';
  var owner    = getOwner();

  var amtInput  = document.getElementById('f-amount');
  var dateInput = document.getElementById('f-date');

  if (!date) {
    dateInput.style.borderColor = 'var(--red)';
    dateInput.focus();
    return;
  }
  if (!amount || isNaN(parseFloat(amount)) || parseFloat(amount) < 0) {
    amtInput.style.borderColor = 'var(--red)';
    amtInput.focus();
    return;
  }
  amtInput.style.borderColor  = '';
  dateInput.style.borderColor = '';

  var record = {
    id:       editingId || uid(),
    date:     date,
    owner:    owner,
    category: category,
    provider: provider,
    amount:   parseFloat(parseFloat(amount).toFixed(2)),
    comment:  comment,
    images:   pendingImages.slice()
  };

  if (editingId) {
    var idx = -1;
    for (var i = 0; i < records.length; i++) { if (records[i].id === editingId) { idx = i; break; } }
    if (idx >= 0) records[idx] = record; else records.push(record);
  } else {
    records.push(record);
  }

  dbPut(record).then(function() {
    closeModal('form-modal');
    render();
  });
}

function deleteRecord() {
  if (!confirm('Delete this expense?')) return;
  var id = editingId;
  records = records.filter(function(r) { return r.id !== id; });
  dbDelete(id).then(function() {
    closeModal('form-modal');
    render();
  });
}

// ============================================================
// IMAGES
// ============================================================
function handleFiles(input) {
  var files = Array.from(input.files);
  var loaded = 0;
  files.forEach(function(f) {
    var reader = new FileReader();
    reader.onload = function(e) {
      pendingImages.push({dataUrl: e.target.result, name: f.name});
      loaded++;
      if (loaded === files.length) renderPreviews();
    };
    reader.readAsDataURL(f);
  });
  input.value = '';
}

function renderPreviews() {
  var container = document.getElementById('attach-preview');
  container.innerHTML = '';
  pendingImages.forEach(function(img, i) {
    var wrap = document.createElement('div');
    wrap.className = 'att-thumb-wrap';
    wrap.innerHTML = '<img class="att-thumb" src="' + img.dataUrl + '" alt="receipt">' +
      '<button type="button" class="att-remove" onclick="removeImg(' + i + ')">×</button>';
    container.appendChild(wrap);
  });
}

function removeImg(i) {
  pendingImages.splice(i, 1);
  renderPreviews();
}

// ============================================================
// FILTER
// ============================================================
function openFilter() {
  tmpFilterCats = filterCats.slice();
  tmpFilterYear = filterYear;

  var fc = document.getElementById('filter-cats');
  fc.innerHTML = '';
  CATS.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-pill' + (tmpFilterCats.indexOf(cat) >= 0 ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = function() {
      var idx = tmpFilterCats.indexOf(cat);
      if (idx >= 0) tmpFilterCats.splice(idx, 1); else tmpFilterCats.push(cat);
      btn.classList.toggle('active');
    };
    fc.appendChild(btn);
  });

  var fy = document.getElementById('filter-years');
  fy.innerHTML = '';
  var curYear = new Date().getFullYear();
  [String(curYear), String(curYear-1), String(curYear-2)].forEach(function(y) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-pill' + (tmpFilterYear === y ? ' active' : '');
    btn.textContent = y;
    btn.onclick = function() {
      tmpFilterYear = tmpFilterYear === y ? null : y;
      document.querySelectorAll('#filter-years .filter-pill').forEach(function(b) {
        b.classList.toggle('active', b.textContent === tmpFilterYear);
      });
    };
    fy.appendChild(btn);
  });
  openModal('filter-modal');
}

function applyFilter() {
  filterCats = tmpFilterCats.slice();
  filterYear = tmpFilterYear;
  closeModal('filter-modal');
  render();
}

function clearFilter() {
  filterCats = []; filterYear = null;
  tmpFilterCats = []; tmpFilterYear = null;
  closeModal('filter-modal');
  render();
}

// ============================================================
// MODALS
// ============================================================
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(function(o) {
  o.addEventListener('click', function(e) { if (e.target === o) o.classList.remove('open'); });
});

// ============================================================
// INSTALL BANNER
// ============================================================
function showInstallBanner() {
  var banner = document.getElementById('install-banner');
  if (banner) banner.style.display = window.navigator.standalone ? 'none' : 'flex';
}

// ============================================================
// BOOT
// ============================================================
initApp();
</script>
</body>
